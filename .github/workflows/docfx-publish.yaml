name: Publish Docs

# Trigger the action on push to main
on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    name: Publish Docs
    permissions:
      actions: read   # Required by actions/deploy-pages to read workflow run metadata.
      pages: write    # Required by actions/deploy-pages to publish the site.
      id-token: write # Required by actions/deploy-pages for OIDC token exchange with GitHub Pages.
    env:
      GH_PAGES_URL: https://open-policy-agent.github.io/opa-csharp
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Patch Speakeasy README docs links
        run: ./scripts/patch-readme.sh README.md "$GH_PAGES_URL"

      - name: Dotnet Setup
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 8.x

      - run: dotnet tool update -g docfx
      - run: docfx docs/docfx.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          # Upload entire repository
          path: "docs/_site"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
